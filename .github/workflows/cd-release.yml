name: CD — Production Release & Migration

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target Environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  run-migrations:
    name: Run Database Migrations (Alembic)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install alembic psycopg2-binary

      - name: Apply DB migrations (Alembic Upgrade Head)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "Error: DATABASE_URL secret is not set!"
            exit 1
          fi
          echo "Running alembic migrations against the target database..."
          alembic upgrade head
          echo "Database migrations successfully applied."
