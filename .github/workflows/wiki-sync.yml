name: Sync Docs to Wiki

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Sync to GitHub Wiki
        run: |
          # Clone the wiki repository
          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" wiki_repo
          
          # Mirror docs/ into the wiki clone, preserving .git/ and removing stale files/directories
          rsync -a --delete --exclude='.git/' docs/ wiki_repo/
          
          cd wiki_repo
          
          # Check if there are changes to commit
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "docs: sync documentation from repository main branch [skip ci]"
            git push
            echo "Wiki successfully updated."
          else
            echo "No changes in documentation to sync."
          fi
