name: Build and Publish to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase Repository Name
        id: repo-name
        run: echo "name=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      # ── 1. Backend Container: Build, Scan & Push ──────────────────────────────────
      - name: Build Backend Container (Local)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend
          load: true
          tags: backend:local
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner on Backend Container
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'backend:local'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Build and Push Backend Container to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          tags: |
            ghcr.io/${{ steps.repo-name.outputs.name }}/backend:latest
            ghcr.io/${{ steps.repo-name.outputs.name }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 2. Frontend Container: Build, Scan & Push ─────────────────────────────────
      - name: Build Frontend Container (Local)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/nextjs
          file: docker/Dockerfile.frontend
          load: true
          tags: frontend:local
          build-args: |
            NEXT_PUBLIC_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner on Frontend Container
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'frontend:local'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Build and Push Frontend Container to GHCR
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/nextjs
          file: docker/Dockerfile.frontend
          push: true
          tags: |
            ghcr.io/${{ steps.repo-name.outputs.name }}/frontend:latest
            ghcr.io/${{ steps.repo-name.outputs.name }}/frontend:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 3. Scraper Container: Build, Scan & Push ──────────────────────────────────
      - name: Build Scraper Container (Local)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.scraper
          load: true
          tags: scraper:local
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner on Scraper Container
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'scraper:local'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Build and Push Scraper Container to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.scraper
          push: true
          tags: |
            ghcr.io/${{ steps.repo-name.outputs.name }}/scraper:latest
            ghcr.io/${{ steps.repo-name.outputs.name }}/scraper:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
