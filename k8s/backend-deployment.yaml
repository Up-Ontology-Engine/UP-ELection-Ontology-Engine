apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: default
  labels:
    app: backend-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-api
  template:
    metadata:
      labels:
        app: backend-api
    spec:
      # ── Init Container to run database migrations before the main container starts ──
      initContainers:
        - name: db-migrations
          image: ghcr.io/username/up-election-ontology-engine/backend:latest
          command: ["alembic", "upgrade", "head"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: database-credentials
                  key: database-url
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: database-credentials
                  key: database-url
      # ── Main container running the FastAPI service ──
      containers:
        - name: backend-api
          image: ghcr.io/username/up-election-ontology-engine/backend:latest
          command: ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: database-credentials
                  key: database-password
            - name: DATABASE_URL
              value: postgresql://postgres:$(DB_PASSWORD)@pgbouncer-service:6432/gorakhpur_db
            - name: POSTGRES_URL
              value: postgresql://postgres:$(DB_PASSWORD)@pgbouncer-service:6432/gorakhpur_db
            - name: NEO4J_URI
              value: bolt://neo4j-service:7687
            - name: REDIS_URL
              value: redis://redis-service:6379/0
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            limits:
              cpu: "1.5"
              memory: 1.5Gi
            requests:
              cpu: "500m"
              memory: 512Mi
